name: Build and Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.x'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.extract_version.outputs.package_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract Version from Tag
        id: extract_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            PACKAGE_VERSION="${TAG#v}"
          else
            # Fallback for manual workflow_dispatch: read from Directory.Build.props
            PACKAGE_VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          fi

          echo "Package Version: $PACKAGE_VERSION"
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

  build-pack-publish:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - Zooper.Gorilla.Attributes/Zooper.Gorilla.Attributes.csproj
          - Zooper.Gorilla.Generators/Zooper.Gorilla.Generators.csproj
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Create nupkg Directory
        run: mkdir -p ./nupkg

      - name: Restore
        run: dotnet restore "${{ matrix.project }}"

      - name: Build
        run: dotnet build "${{ matrix.project }}" --configuration Release /p:PackageVersion=${{ needs.setup.outputs.package_version }}

      - name: Pack
        run: dotnet pack "${{ matrix.project }}" --configuration Release /p:PackageVersion=${{ needs.setup.outputs.package_version }} --output ./nupkg

      - name: Publish
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json